name: Lint and Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install chromium

      - name: Compile (TypeScript)
        run: npm run compile

      - name: Lint (ESLint)
        run: npm run lint

      - name: Lint (Prettier)
        run: npm run format-check

      - name: Test
        run: npm run coverage
