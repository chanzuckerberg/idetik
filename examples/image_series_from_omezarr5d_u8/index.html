<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Viewer</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      display: flex;
      width: 100%;
      height: 100%;
    }

    #main {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    #canvas {
      flex: 1;
      min-height: 0;
    }

    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255, 255, 255, 0.8);
      padding: 10px;
      border-radius: 5px;
    }

    .channel-toggle {
      margin: 5px 0;
    }

    #slider {
      margin: 1rem 2rem;
    }
  </style>
</head>

<body>
  <div id="main">
    <canvas id="canvas"></canvas>
    <div id="controls">
      <div class="channel-toggle">
        <input type="checkbox" id="channel-r" checked>
        <label for="channel-r" style="color: red">Red Channel</label>
      </div>
      <div class="channel-toggle">
        <input type="checkbox" id="channel-g" checked>
        <label for="channel-g" style="color: green">Green Channel</label>
      </div>
      <div class="channel-toggle">
        <input type="checkbox" id="channel-b" checked>
        <label for="channel-b" style="color: blue">Blue Channel</label>
      </div>
    </div>
    <input type="range" id="slider" />
  </div>
  <script type="module" src="./main.ts"></script>
</body>

</html>
