<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Z-Stack Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        display: flex;
        width: 100%;
        height: 100%;
      }
      #main {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }
      #canvas {
        flex: 1;
        min-height: 0;
      }
      #controls {
        margin: 0.5rem 2rem;
        font-family: sans-serif;
      }
      .control-row {
        display: flex;
        flex-direction: row;
        align-items: center;
        margin-bottom: 1rem;
      }
      .control-label {
        width: 120px;
      }
      .slider-container {
        flex: 1;
        margin: 0 1rem;
      }
      .value-label {
        width: 120px;
        text-align: right;
      }
      input[type="range"] {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <canvas id="canvas"></canvas>
      <div id="controls">
        <div class="control-row">
          <div class="control-label">Z Slice:</div>
          <div class="slider-container">
            <input type="range" id="z-slider" />
          </div>
          <div class="value-label">
            <span id="z-index">0</span> / <span id="z-total">0</span>
          </div>
        </div>
        <div class="control-row">
          <div class="control-label">Min Value:</div>
          <div class="slider-container">
            <input
              type="range"
              id="min-slider"
              min="-1"
              max="0"
              step="0.01"
              value="-0.5"
            />
          </div>
          <div class="value-label"><span id="min-value">-0.5</span></div>
        </div>
        <div class="control-row">
          <div class="control-label">Max Value:</div>
          <div class="slider-container">
            <input
              type="range"
              id="max-slider"
              min="0"
              max="1"
              step="0.01"
              value="0.5"
            />
          </div>
          <div class="value-label"><span id="max-value">0.5</span></div>
        </div>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
