<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S3 Private Data with Authentication</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        display: flex;
        width: 100%;
        height: 100%;
      }
      canvas {
        width: 100%;
        height: 100%;
      }
      #info-box {
        display: flex;
        flex-direction: column;
        position: absolute;
        top: 1em;
        right: 1em;
        max-width: 400px;
        padding: 1em;
        gap: 0.5em;
        background-color: rgba(0, 0, 0, 0.8);
        color: white;
        user-select: none;
        font-family: monospace;
        font-size: 12px;
      }
      #info-box h3 {
        margin: 0 0 0.5em 0;
        color: #4CAF50;
      }
      #info-box .status {
        color: #FFC107;
      }
      #info-box .success {
        color: #4CAF50;
      }
      #info-box .error {
        color: #F44336;
      }
      #info-box code {
        background: rgba(255, 255, 255, 0.1);
        padding: 2px 4px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="info-box">
      <h3>🔐 S3 Private Data Example</h3>
      <div id="status">Loading...</div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
