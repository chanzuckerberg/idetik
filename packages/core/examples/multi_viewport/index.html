<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi-Viewport Chunk Sharing</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: monospace;
        font-size: 12px;
      }

      #canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      .viewport-overlay {
        position: absolute;
        border: 2px solid #333;
        box-sizing: border-box;
        pointer-events: auto;
      }

      .viewport-label {
        position: absolute;
        top: 10px;
        left: 10px;
        padding: 8px 12px;
        background-color: rgba(0, 0, 0, 0.7);
        color: white;
        border-radius: 4px;
        pointer-events: none;
        z-index: 10;
      }

      .viewport-gui-container {
        position: absolute;
        bottom: 10px;
        left: 10px;
        z-index: 10;
        pointer-events: auto;
      }

      .viewport-gui-container .lil-gui {
        --width: 250px;
        --background-color: rgba(20, 20, 20, 0.9);
      }

      .divider {
        position: absolute;
        background-color: #666;
        z-index: 100;
      }

      .horizontal-divider {
        width: 100%;
        height: 4px;
        cursor: ns-resize;
        transform: translateY(-2px);
      }

      .vertical-divider {
        height: 100%;
        width: 4px;
        cursor: ew-resize;
        transform: translateX(-2px);
      }

      .divider:hover {
        background-color: #888;
      }
    </style>
  </head>

  <body>
    <canvas id="canvas"></canvas>
    <div id="viewport-container"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
