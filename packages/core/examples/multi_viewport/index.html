<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi-Viewport Example</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        display: flex;
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
      }

      .viewport-container {
        position: relative;
        width: 100%;
        height: 100%;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .viewport-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;

        /* 2x2 flexbox grid */
        display: grid;
        grid-template: 1fr 1fr / 1fr 1fr;
        gap: 2px;
      }

      .viewport {
        pointer-events: auto;
        border: none;
        position: relative;
        background: rgba(0, 0, 0, 0.1);
        transition: border 0.1s ease;
      }

      .viewport:hover {
        border: 3px solid white;
      }

      .viewport-label {
        position: absolute;
        bottom: 8px;
        right: 8px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: bold;
        z-index: 100;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="viewport-container">
      <canvas id="webgl-canvas" width="800" height="600"></canvas>
      <div class="viewport-overlay">
        <div class="viewport" data-view-id="A">
          <div class="viewport-label">Viewport A</div>
        </div>
        <div class="viewport" data-view-id="B">
          <div class="viewport-label">Viewport B</div>
        </div>
        <div class="viewport" data-view-id="C">
          <div class="viewport-label">Viewport C</div>
        </div>
        <div class="viewport" data-view-id="D">
          <div class="viewport-label">Viewport D</div>
        </div>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
