<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        display: flex;
        width: 100%;
        height: 100%;
        font-family: monospace;
        font-size: 12px;
      }

      canvas {
        width: 100%;
        height: 100%;
      }

      #fps-text {
        position: absolute;
        top: 1em;
        left: 1em;
        width: 10%;
        margin: 1em;
        padding: 1em;
        color: white;
        background-color: rgba(0, 0, 0, 0.5);
        user-select: none;
      }

      #chunk-info {
        position: absolute;
        top: 1em;
        right: 1em;
        width: 40%;
        margin: 1em;
        padding: 1em;
        color: white;
        background-color: rgba(0, 0, 0, 0.5);
        user-select: none;
      }
    </style>
  </head>

  <body>
    <canvas id="canvas"></canvas>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
