<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Point Picking Example</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        display: flex;
        width: 100%;
        height: 100%;
        font-family: monospace;
      }

      canvas {
        width: 100%;
        height: 100%;
      }

      #info-box {
        display: flex;
        flex-direction: column;
        position: absolute;
        top: 1em;
        right: 1em;
        width: 300px;
        margin: 1em;
        padding: 1em;
        gap: 0.5em;
        align-items: start;
        justify-content: center;
        background-color: rgba(0, 0, 0, 0.8);
        color: white;
        user-select: none;
      }
    </style>
  </head>

  <body>
    <canvas id="canvas"></canvas>
    <div id="info-box">
      <div><strong>Point Picking Demo</strong></div>
      <div>Click on the image to pick values</div>
      <div id="pick-info">Click to see pick results...</div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
