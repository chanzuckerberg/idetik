<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        display: flex;
        width: 100%;
        height: 100%;
      }
      canvas {
        width: 100%;
        height: 100%;
      }
      #scale-bar-box {
        position: absolute;
        bottom: 1em;
        left: 1em;
        width: 25%;
        margin: 1em;
        padding: 1em;
        display: flex;
        flex-direction: column;
        gap: 0.5em;
        justify-content: center;
        align-items: center;
        background-color: rgba(0, 0, 0, 0.5);
        user-select: none;
      }
      #scale-bar-text {
        color: white;
        text-align: center;
      }
      #scale-bar-line {
        width: 100%;
        height: 1em;
        background-color: white;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="scale-bar-box">
      <div id="scale-bar-text">unknown</div>
      <div id="scale-bar-line"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
